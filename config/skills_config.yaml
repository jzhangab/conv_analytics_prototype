skills:
  cro_site_profiling:
    display_name: "CRO Site Profiling"
    description: >
      Matches an uploaded CRO site list against the CTMS master site database and profiles
      each matched site with performance metrics (average enrolled patients per site,
      average months diff). Accepts CSV or Excel file uploads.
    required_parameters:
      - name: site_file
        label: "Site List File"
        description: "CSV or Excel file containing the list of clinical sites to match and profile against CTMS"
        data_type: file

  trial_benchmarking:
    display_name: "Clinical Trial Benchmarking"
    description: >
      Benchmarks clinical trials based on indication, age group, and phase.
      Provides metrics on enrollment rates, dropout rates, typical site counts, and duration.
    required_parameters:
      - name: indication
        label: "Indication"
        description: "Therapeutic area or specific disease (e.g., NSCLC, Type 2 Diabetes)"
        data_type: string
      - name: age_group
        label: "Age Group"
        description: "Target patient population age bracket"
        data_type: choice
        choices:
          - pediatric
          - adult
          - elderly
          - all-comers
        aliases:
          pediatric: ["children", "child", "kids", "paediatric", "<18", "under 18"]
          adult: ["adults", "adult patients", "18+", "18-65"]
          elderly: ["elderly", "geriatric", "seniors", ">65", "over 65"]
          all-comers: ["all ages", "all comers", "any age", "mixed"]
      - name: phase
        label: "Trial Phase"
        description: "Clinical trial phase"
        data_type: choice
        choices:
          - "Phase 1"
          - "Phase 2"
          - "Phase 3"
          - "Phase 1/2"
          - "Phase 2/3"

  drug_reimbursement:
    display_name: "Drug Reimbursement Assessment"
    description: >
      Assesses drug reimbursement likelihood and requirements by country,
      given indication, age group, and development phase.
    required_parameters:
      - name: indication
        label: "Indication"
        description: "Therapeutic area or specific disease"
        data_type: string
      - name: age_group
        label: "Age Group"
        description: "Target patient population age bracket"
        data_type: choice
        choices:
          - pediatric
          - adult
          - elderly
          - all-comers
      - name: phase
        label: "Trial Phase"
        description: "Clinical trial phase"
        data_type: choice
        choices:
          - "Phase 1"
          - "Phase 2"
          - "Phase 3"
          - "Phase 1/2"
          - "Phase 2/3"
      - name: countries
        label: "Countries"
        description: "Countries to assess for reimbursement (e.g., US, Germany, Japan)"
        data_type: list

  enrollment_forecasting:
    display_name: "Enrollment & Site Activation Forecasting"
    description: >
      Forecasts clinical trial enrollment and site activation rates over time,
      producing pessimistic, moderate, and optimistic scenario curves.
    required_parameters:
      - name: indication
        label: "Indication"
        description: "Therapeutic area or specific disease"
        data_type: string
      - name: age_group
        label: "Age Group"
        description: "Target patient population age bracket"
        data_type: choice
        choices:
          - pediatric
          - adult
          - elderly
          - all-comers
      - name: phase
        label: "Trial Phase"
        description: "Clinical trial phase"
        data_type: choice
        choices:
          - "Phase 1"
          - "Phase 2"
          - "Phase 3"
          - "Phase 1/2"
          - "Phase 2/3"
      - name: num_sites
        label: "Number of Sites"
        description: "Planned number of clinical sites"
        data_type: integer
      - name: num_patients
        label: "Number of Patients"
        description: "Target number of patients to recruit"
        data_type: integer
    optional_parameters:
      - name: enrollment_start_date
        label: "Planned Enrollment Start Date"
        description: "Date of first patient in (YYYY-MM-DD). Defaults to today."
        data_type: date

  country_ranking:
    display_name: "Country Ranking by Trial Experience"
    description: >
      Ranks countries globally by their experience in executing clinical trials
      for a given indication. Uses web search to gather data on trial activity,
      regulatory infrastructure, and investigator density per country.
    required_parameters:
      - name: indication
        label: "Indication"
        description: "Therapeutic area or specific disease (e.g., NSCLC, Type 2 Diabetes)"
        data_type: string
    optional_parameters:
      - name: age_group
        label: "Age Group"
        description: "Target patient population age bracket"
        data_type: choice
        choices:
          - pediatric
          - adult
          - elderly
          - all-comers
        aliases:
          pediatric: ["children", "child", "kids", "paediatric", "<18", "under 18"]
          adult: ["adults", "adult patients", "18+", "18-65"]
          elderly: ["elderly", "geriatric", "seniors", ">65", "over 65"]
          all-comers: ["all ages", "all comers", "any age", "mixed"]
      - name: phase
        label: "Trial Phase"
        description: "Clinical trial phase"
        data_type: choice
        choices:
          - "Phase 1"
          - "Phase 2"
          - "Phase 3"
          - "Phase 1/2"
          - "Phase 2/3"

  reforecasting:
    display_name: "Enrollment Reforecasting"
    description: >
      Retrieves and plots reforecast enrollment data for a specific protocol.
      Shows lower bound, mean, and upper bound enrollment curves over time,
      plus a target enrollment line. Data is loaded from the REFORECAST dataset.
    required_parameters:
      - name: protocol_id
        label: "Protocol ID"
        description: "The protocol number to look up in the REFORECAST dataset (e.g., PROTO-001)"
        data_type: string

  protocol_analysis:
    display_name: "Clinical Trial Protocol Analysis"
    description: >
      Analyses an uploaded clinical trial protocol document (PDF, DOCX, or TXT) for
      study design improvements. Reviews endpoints, statistical approach, inclusion/exclusion
      criteria, operational feasibility, safety monitoring, and regulatory alignment.
    required_parameters:
      - name: protocol_file
        label: "Protocol Document"
        description: "Clinical trial protocol as a PDF, DOCX, or TXT file"
        data_type: file
