llm_mesh:
  connection_id: "YOUR_LLM_CONNECTION_ID"   # Replace with your Dataiku LLM Mesh connection ID
  temperature_classify: 0.1                  # Low temp for deterministic intent classification
  temperature_extract: 0.1                   # Low temp for parameter extraction
  temperature_agents: 0.3                    # Moderate temp for agent responses
  temperature_deterministic: 0.0             # Zero temp for data tasks (site merger)
  max_tokens: 16384
  context_window_turns: 10                   # Number of prior turns sent to LLM

data_sources:
  citeline_dataset: "CITELINE_DATA"   # Dataiku dataset name for Citeline trial data

session:
  timeout_minutes: 30

upload:
  allowed_extensions:
    - csv
    - xlsx
    - xls
    - pdf
    - docx
    - txt
  max_size_mb: 25

serp_api:
  api_key: "YOUR_SERPAPI_KEY"           # Replace with your SerpApi key (https://serpapi.com)
  enabled: false                         # Set to true to enable web search in skills
  max_results: 5                         # Number of search results per query
  engine: "google"                       # SerpApi engine (google, bing, etc.)
